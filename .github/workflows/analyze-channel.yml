name: Analyze Channel & Generate Report

on:
  schedule:
    - cron: '30 0 * * *'  # 毎日UTC0:30（日本時間9:30）に自動実行
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest YouTube stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: UCeyl-ZJg2pvEUR_Bg7qPyVQ
        run: python .github/scripts/fetch_youtube_stats.py

      - name: Analyze channel & generate report
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          CHANNEL_ID: UCeyl-ZJg2pvEUR_Bg7qPyVQ
        run: python .github/scripts/analyze_channel.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_stats.json video_report.md
          git diff --staged --quiet || git commit -m "Update channel analysis report"
          git push
