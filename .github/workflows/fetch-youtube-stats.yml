name: Fetch YouTube Stats

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日UTC0時（日本時間9時）に自動実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch YouTube channel stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: UCeyl-ZJg2pvEUR_Bg7qPyVQ
        run: python .github/scripts/fetch_youtube_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube_stats.json
          git diff --staged --quiet || git commit -m "Update YouTube stats"
          git push
